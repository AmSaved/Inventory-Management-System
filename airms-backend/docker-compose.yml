version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: airms-postgres
    environment:
      POSTGRES_DB: airms_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/01-schema:/docker-entrypoint-initdb.d
    networks:
      - airms-network

  backend:
    build: .
    container_name: airms-backend
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: airms_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: your-super-secret-jwt-key
    ports:
      - "5000:5000"
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    depends_on:
      - postgres
    networks:
      - airms-network
    command: npm run dev

volumes:
  postgres_data:

networks:
  airms-network:
    driver: bridge